<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0f172a"/>

  <!--
    The three strokes of the "N" represent the three bus layers:
      Left vertical  — Layer 1: BroadcastChannel
      Diagonal       — Layer 2: Blob SharedWorker
      Right vertical — Layer 3: Static-URL SharedWorker
    The four corner nodes are connected MFEs/tabs; the centre hub is the SharedWorker.
  -->

  <!-- Italic skew (~10°) pivoted around the icon centre -->
  <g transform="translate(50,50) skewX(-10) translate(-50,-50)">

    <!-- Left vertical stroke -->
    <line x1="28" y1="24" x2="28" y2="76"
          stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Diagonal stroke -->
    <line x1="28" y1="24" x2="72" y2="76"
          stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Right vertical stroke -->
    <line x1="72" y1="24" x2="72" y2="76"
          stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"/>

    <!-- Nodes with glow -->
    <g filter="url(#glow)">
      <!-- Corner nodes (connected tabs / MFEs) -->
      <circle cx="28" cy="20" r="5.2" fill="url(#g)"/>
      <circle cx="72" cy="20" r="5.2" fill="url(#g)"/>
      <circle cx="28" cy="80" r="5.2" fill="url(#g)"/>
      <circle cx="72" cy="80" r="5.2" fill="url(#g)"/>

      <!-- Centre hub — SharedWorker -->
      <circle cx="50" cy="50" r="7.8" fill="url(#g)"/>
    </g>

  </g>
</svg>
